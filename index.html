<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Caçador de Germes: Missão Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #020d2a;
  --bg-dark: #0a0f2b;
  --bg-mid:  #0e132a;
  --bg-panel:#0c1128;
  --cyan:    #07f5f5;
  --cyan-mid:#38cce9;
  --cyan-sft:#2ed7e4;
  --teal:    #1c9ba6;
  --teal-dk: #235364;
  --red:     #d1201f;
  --red-dk:  #9a2328;
  --green:   #aae36e;
  --green-md:#3c9e4f;
  --yellow:  #f2d52c;
  --text:    #e5e7ea;
  --text-dim:#9a9ca6;
}

body {
  background: radial-gradient(circle at 50% 30%, #0a1540 0%, #02060f 70%);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  overflow: hidden; user-select: none; -webkit-user-select: none;
}

#game-wrapper {
  position: relative;
  width: 960px; height: 640px;
  background: var(--bg-deep);
  border: 3px solid var(--cyan);
  box-shadow: 0 0 80px rgba(7,245,245,0.25), inset 0 0 50px rgba(2,13,42,0.9);
  border-radius: 10px; overflow: hidden;
  image-rendering: pixelated; -ms-interpolation-mode: nearest-neighbor;
}

canvas {
  display: block; width: 100%; height: 100%;
  image-rendering: pixelated; -ms-interpolation-mode: nearest-neighbor;
  cursor: crosshair;
}

.screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: rgba(2,13,42,0.86); z-index: 10;
  opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
  padding: 20px;
}
.screen.active { opacity: 1; pointer-events: auto; }

.pixel-title {
  font-size: 38px; color: var(--cyan);
  text-shadow: 0 0 12px rgba(7,245,245,0.6), 3px 3px 0 #053a3a;
  margin-bottom: 8px; text-align: center; line-height: 1.3;
}
.pixel-subtitle {
  font-size: 14px; color: var(--cyan-mid);
  margin-bottom: 26px; text-align: center; letter-spacing: 2px;
}

.btn {
  font-family: 'Press Start 2P', monospace; font-size: 14px;
  padding: 14px 36px; margin: 6px;
  border: 2px solid var(--cyan); color: var(--cyan);
  background: linear-gradient(180deg, rgba(28,155,166,0.25) 0%, rgba(2,13,42,0.9) 100%);
  cursor: pointer; transition: all 0.15s ease;
  min-width: 240px; text-align: center; border-radius: 4px;
  text-shadow: 0 0 8px rgba(7,245,245,0.5);
}
.btn:hover {
  border-color: var(--cyan); color: #fff;
  background: linear-gradient(180deg, rgba(7,245,245,0.3) 0%, rgba(28,155,166,0.4) 100%);
  transform: scale(1.03); box-shadow: 0 0 24px rgba(7,245,245,0.4);
}
.btn:active { transform: scale(0.98); }

.btn-green { border-color: var(--green-md); color: var(--green);
  text-shadow: 0 0 8px rgba(170,227,110,0.5);
  background: linear-gradient(180deg, rgba(60,158,79,0.25) 0%, rgba(10,30,15,0.9) 100%); }
.btn-green:hover { border-color: var(--green); color: #fff;
  background: linear-gradient(180deg, rgba(170,227,110,0.3) 0%, rgba(60,158,79,0.4) 100%);
  box-shadow: 0 0 24px rgba(170,227,110,0.4); }

.btn-red { border-color: var(--red); color: #ff6b6b;
  background: linear-gradient(180deg, rgba(209,32,31,0.25) 0%, rgba(40,8,8,0.9) 100%); }
.btn-red:hover { border-color: #ff6b6b; color: #fff;
  background: linear-gradient(180deg, rgba(209,32,31,0.4) 0%, rgba(154,35,40,0.5) 100%);
  box-shadow: 0 0 24px rgba(209,32,31,0.4); }

.screen-text {
  font-size: 11px; color: var(--text-dim); text-align: center;
  line-height: 1.9; max-width: 600px; margin: 14px 0; padding: 0 20px;
}
.screen-text strong, .screen-text b { color: var(--cyan); }

.instruction-item {
  display: flex; align-items: center; gap: 12px; margin: 9px 0;
  font-size: 10px; color: var(--text); text-align: left;
  width: 100%; max-width: 520px;
}
.instruction-item b { color: var(--cyan-mid); }
.instruction-icon {
  width: 26px; height: 26px; border-radius: 4px; flex-shrink: 0;
  border: 2px solid; box-shadow: 0 0 10px currentColor;
}
#instructions-controls {
  margin-top: 14px; font-size: 9px; color: var(--cyan-mid);
  letter-spacing: 1px;
}

.phase-message {
  font-size: 15px; color: #fff; margin: 18px 0; text-align: center;
  line-height: 1.8; padding: 0 30px;
}
.curiosity-box {
  background: rgba(7,245,245,0.08); border: 2px solid var(--cyan);
  border-radius: 6px; padding: 16px 20px; max-width: 540px; margin: 16px 0;
  font-size: 10px; color: var(--cyan-mid); text-align: center; line-height: 1.9;
  box-shadow: 0 0 20px rgba(7,245,245,0.15);
}

.game-over-stats {
  font-size: 13px; color: #fff; text-align: center; line-height: 2.2; margin: 14px 0;
}
.game-over-stats span { color: var(--yellow); }

.credits-block { font-size: 11px; color: var(--text-dim); margin: 8px 0; line-height: 1.9; }
.credits-block b { color: var(--cyan); }

.controls-hint {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  font-size: 8px; color: rgba(229,231,234,0.5); z-index: 5; pointer-events: none;
}

@media (max-width: 980px) {
  #game-wrapper { width: 100vw; height: 66vw; max-height: 100vh; border-width: 2px; border-radius: 0; }
  .pixel-title { font-size: 26px; }
  .pixel-subtitle { font-size: 11px; }
  .btn { font-size: 11px; padding: 12px 24px; min-width: 190px; }
  .screen-text { font-size: 9px; }
  .instruction-item { font-size: 8px; }
  .phase-message { font-size: 12px; }
  .curiosity-box { font-size: 8px; }
  .game-over-stats { font-size: 10px; }
}
@media (max-width: 520px) {
  .pixel-title { font-size: 20px; }
  .btn { font-size: 9px; padding: 10px 18px; min-width: 150px; margin: 4px; }
}
</style>
</head>
<body>

<div id="game-wrapper">
  <canvas id="gameCanvas"></canvas>

  <div id="menu-screen" class="screen active">
    <div class="pixel-title" style="font-size:34px;line-height:1.4;">CAÇADOR<br>DE GERMES</div>
    <div class="pixel-subtitle">MISSÃO SAÚDE</div>
    <button class="btn" onclick="game.startGame()">▶ JOGAR</button>
    <button class="btn" onclick="game.showInstructions()">❓ INSTRUÇÕES</button>
    <button class="btn" onclick="game.showCredits()">★ CRÉDITOS</button>
  </div>

  <div id="instructions-screen" class="screen">
    <div class="pixel-title" style="font-size:22px;margin-bottom:14px;">INSTRUÇÕES</div>
    <div id="instructions-list"></div>
    <div class="screen-text" id="instructions-footer"></div>
    <div id="instructions-controls"></div>
    <button class="btn btn-green" onclick="game.showMenu()" style="margin-top:14px;">← VOLTAR</button>
  </div>

  <div id="phase-screen" class="screen">
    <div class="pixel-title" style="font-size:24px;margin-bottom:8px;">FASE <span id="phase-number">1</span></div>
    <div class="phase-message" id="phase-message"></div>
    <div class="curiosity-box" id="phase-curiosity"></div>
    <button class="btn btn-green" onclick="game.startPlaying()" id="phase-btn">▶ COMEÇAR</button>
  </div>

  <div id="gameover-screen" class="screen">
    <div class="pixel-title" style="font-size:26px;color:#ff6b6b;margin-bottom:14px;">GAME OVER</div>
    <div class="screen-text" style="font-size:13px;color:#ffcdd2;">A cidade foi contaminada!</div>
    <div class="game-over-stats">
      Pontuação Final: <span id="final-score">0</span><br>
      Germes Eliminados: <span id="final-germs">0</span><br>
      Fase Atingida: <span id="final-phase">1</span><br>
      Tempo: <span id="final-time">00:00</span>
    </div>
    <button class="btn btn-red" onclick="game.showMenu()">← MENU</button>
    <button class="btn btn-green" onclick="game.startGame()">↻ TENTAR NOVAMENTE</button>
  </div>

  <div id="credits-screen" class="screen">
    <div class="pixel-title" style="font-size:22px;margin-bottom:18px;">CRÉDITOS</div>
    <div id="credits-text" class="screen-text"></div>
    <button class="btn" onclick="game.showMenu()" style="margin-top:14px;">← VOLTAR</button>
  </div>

  <div class="controls-hint" id="controls-hint">WASD/Setas: mover • Mouse: mirar • Clique/Espaço: atirar</div>
</div>

<!-- Modules loaded in dependency order (classic scripts, works via file://) -->
<script src="src/config.js"></script>
<script src="src/content.js"></script>
<script src="src/utils.js"></script>
<script src="src/assets.js"></script>
<script src="src/audio.js"></script>
<script src="src/input.js"></script>
<script src="src/sprites.js"></script>
<script src="src/background.js"></script>
<script src="src/particles.js"></script>
<script src="src/entities/player.js"></script>
<script src="src/entities/bullet.js"></script>
<script src="src/entities/germ.js"></script>
<script src="src/entities/powerup.js"></script>
<script src="src/hud.js"></script>
<script src="src/screens.js"></script>
<script src="src/game.js"></script>
<script src="src/main.js"></script>
</body>
</html>
